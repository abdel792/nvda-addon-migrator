name: Build Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies and build executable
        run: |
          uv sync --all-extras
          uv run pyinstaller nvda-addon-migrator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvda-addon-migrator
          path: dist/nvda-addon-migrator.exe
          archive: false

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-auto"
          name: "Automated Release (Latest Build)"
          draft: false
          prerelease: false
          files: dist/nvda-addon-migrator.exe
